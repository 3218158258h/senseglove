/**/controller_manager:
  ros__parameters:
    update_rate: 60    

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

/**/senseglove_state_broadcaster:
  ros__parameters:
    type: senseglove_state_broadcaster/SenseGloveStateBroadcaster
    topic_name: senseglove_states
    frame_id: world
    joints:
      - l_thumb_mcp
      - l_thumb_pip
      - l_thumb_dip
      - l_thumb_brake
      - l_index_mcp
      - l_index_pip
      - l_index_dip
      - l_index_brake
      - l_middle_mcp
      - l_middle_pip
      - l_middle_dip
      - l_middle_brake
      - l_ring_mcp
      - l_ring_pip
      - l_ring_dip
      - l_ring_brake
      - l_pinky_mcp
      - l_pinky_pip
      - l_pinky_dip
      - l_pinky_brake

/**/haptics_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - l_thumb_brake   # FFB
      - l_index_brake   # FFB
      - l_middle_brake  # FFB
      - l_ring_brake    # FFB
      - l_palm_strap    # Palm Strap
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    action_monitor_rate: 60.0
    allow_partial_joints_goal: true
    interpolate_from_desired_state: true
    constraints:
      goal_time: 0.05
    # Suppress the "legacy anti-windup" deprecation logs
    gains:
      l_thumb_brake:  { p: 1.0, i: 0.0, d: 0.0, antiwindup_strategy: "none" }
      l_index_brake:  { p: 1.0, i: 0.0, d: 0.0, antiwindup_strategy: "none" }
      l_middle_brake: { p: 1.0, i: 0.0, d: 0.0, antiwindup_strategy: "none" }
      l_ring_brake:   { p: 1.0, i: 0.0, d: 0.0, antiwindup_strategy: "none" }
      l_palm_strap:   { p: 1.0, i: 0.0, d: 0.0, antiwindup_strategy: "none" }